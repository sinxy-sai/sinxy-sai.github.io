name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "vps-production"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vps_deploy_key "$VPS_USER@$VPS_HOST" <<'EOF'
            set -euo pipefail
            cd ~/sinxy-sai.github.io
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            rm -rf /var/www/sinxy-blog/*
            cp -r dist/* /var/www/sinxy-blog/
            find /var/www/sinxy-blog -type d -exec chmod 755 {} \;
            find /var/www/sinxy-blog -type f -exec chmod 644 {} \;
            sudo -n systemctl restart sinxy-blog
            sudo -n systemctl status sinxy-blog --no-pager
          EOF
