services:
  nginx:
    image: nginx:alpine
    container_name: sinxy-blog-local-proxy
    ports:
      - "${LOCAL_TEST_PORT:-8080}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
